version: '3.8'

services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiagents-stockinfo
    ports:
      - "8501:8501"
    volumes:
      # 挂载数据目录，持久化数据
      - ./data:/app/data
      - ./log:/app/log
      - ./config:/app/config
    environment:
      # 设置环境变量
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - stock-network
    # 资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

networks:
  stock-network:
    driver: bridge
